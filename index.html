<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Grant</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
  width: 100%;
  background: black;
}

/* Center image without stretching */
#bgImage {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  pointer-events: none;
  user-select: none;
}

/* Game canvas overlay */
canvas {
  position: fixed;
  inset: 0;
  display: block;
  z-index: 5;
  background: transparent;
}

/* Mobile controls */
#mobileControls {
  display: none;
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

.controls-grid {
  display: grid;
  grid-template-columns: 70px 70px 70px;
  grid-template-rows: 70px 70px;
  gap: 10px;
}

.control-btn {
  width: 70px;
  height: 70px;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 15px;
  color: white;
  font-size: 28px;
  backdrop-filter: blur(8px);
}

.control-btn:active {
  background: rgba(255,255,255,0.35);
}

/* Show arrows only on touch devices */
@media (hover: none) and (pointer: coarse) {
  #mobileControls {
    display: block;
  }
}
</style>
</head>
<body>

<!-- Background image -->
<img id="bgImage" src="image.jpg" alt="Background">

<!-- Game canvas -->
<canvas id="game"></canvas>

<!-- Mobile arrows -->
<div id="mobileControls">
  <div class="controls-grid">
    <div></div>
    <button class="control-btn" id="up">▲</button>
    <div></div>
    <button class="control-btn" id="left">◀</button>
    <button class="control-btn" id="down">▼</button>
    <button class="control-btn" id="right">▶</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  cols = Math.floor(canvas.width / cellSize);
  rows = Math.floor(canvas.height / cellSize);
}
window.addEventListener("resize", resize);

const cellSize = 20;
let cols, rows;
resize();

let snake, direction, nextDirection, food;

function resetGame() {
  snake = [{ x: Math.floor(cols/2), y: Math.floor(rows/2) }];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  placeFood();
}

function placeFood() {
  food = {
    x: Math.floor(Math.random() * cols),
    y: Math.floor(Math.random() * rows)
  };
}

function gameLoop() {
  direction = nextDirection;

  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y
  };

  if (
    head.x < 0 || head.x >= cols ||
    head.y < 0 || head.y >= rows ||
    snake.some(s => s.x === head.x && s.y === head.y)
  ) {
    resetGame();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  snake.forEach(part => {
    ctx.fillRect(part.x * cellSize, part.y * cellSize, cellSize-1, cellSize-1);
  });

  ctx.fillStyle = "lime";
  ctx.fillRect(food.x * cellSize, food.y * cellSize, cellSize-1, cellSize-1);
}

/* Desktop controls */
window.addEventListener("keydown", e => {
  if (e.key === "ArrowUp" && direction.y !== 1)
    nextDirection = { x: 0, y: -1 };
  if (e.key === "ArrowDown" && direction.y !== -1)
    nextDirection = { x: 0, y: 1 };
  if (e.key === "ArrowLeft" && direction.x !== 1)
    nextDirection = { x: -1, y: 0 };
  if (e.key === "ArrowRight" && direction.x !== -1)
    nextDirection = { x: 1, y: 0 };
});

/* Mobile controls */
document.getElementById("up").onclick = () => {
  if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
};
document.getElementById("down").onclick = () => {
  if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
};
document.getElementById("left").onclick = () => {
  if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
};
document.getElementById("right").onclick = () => {
  if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
};

resetGame();
setInterval(gameLoop, 100);
</script>

</body>
</html>

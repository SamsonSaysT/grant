<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Grant</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
  width: 100%;

  /* Tiled GIF background */
  background-image: url("gg.gif");
  background-repeat: repeat;
  background-position: top left;
}

/* Center background image at natural size */
#bgImage {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  pointer-events: none;
  user-select: none;
  z-index: 1;
}

/* Game canvas */
canvas {
  position: fixed;
  inset: 0;
  z-index: 5;
  background: transparent;
}

/* Mobile controls */
#mobileControls {
  display: none;
  position: fixed;
  bottom: 70px; /* tasteful spacing */
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
}

.controls-grid {
  display: grid;
  grid-template-columns: 80px 80px 80px;
  grid-template-rows: 80px 80px;
  gap: 14px;
  justify-items: center;
  align-items: center;
}

.control-btn {
  width: 80px;
  height: 80px;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.35);
  border-radius: 20px;
  color: white;
  font-size: 32px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.control-btn:active {
  background: rgba(255,255,255,0.35);
}
</style>
</head>
<body>

<img id="bgImage" src="image.jpg" alt="Background">

<canvas id="game"></canvas>

<div id="mobileControls">
  <div class="controls-grid">
    <div></div>
    <button class="control-btn" id="up">▲</button>
    <div></div>
    <button class="control-btn" id="left">◀</button>
    <button class="control-btn" id="down">▼</button>
    <button class="control-btn" id="right">▶</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const cellSize = 20;

let cols, rows;
let snake, direction, nextDirection, food;

/* Detect touch device and show arrows */
if ("ontouchstart" in window || navigator.maxTouchPoints > 0) {
  document.getElementById("mobileControls").style.display = "block";
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  cols = Math.floor(canvas.width / cellSize);
  rows = Math.floor(canvas.height / cellSize);
}
window.addEventListener("resize", resize);
resize();

function resetGame() {
  snake = [{ x: Math.floor(cols/2), y: Math.floor(rows/2) }];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  placeFood();
}

function placeFood() {
  food = {
    x: Math.floor(Math.random() * cols),
    y: Math.floor(Math.random() * rows)
  };
}

function gameLoop() {
  direction = nextDirection;

  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y
  };

  // collision detection
  if (
    head.x < 0 || head.x >= cols ||
    head.y < 0 || head.y >= rows ||
    snake.some(s => s.x === head.x && s.y === head.y)
  ) {
    resetGame();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  snake.forEach(part => {
    ctx.fillRect(part.x * cellSize, part.y * cellSize, cellSize - 1, cellSize - 1);
  });

  ctx.fillStyle = "lime";
  ctx.fillRect(food.x * cellSize, food.y * cellSize, cellSize - 1, cellSize - 1);
}

/* Desktop keyboard controls */
window.addEventListener("keydown", e => {
  if (e.key === "ArrowUp" && direction.y !== 1)
    nextDirection = { x: 0, y: -1 };
  if (e.key === "ArrowDown" && direction.y !== -1)
    nextDirection = { x: 0, y: 1 };
  if (e.key === "ArrowLeft" && direction.x !== 1)
    nextDirection = { x: -1, y: 0 };
  if (e.key === "ArrowRight" && direction.x !== -1)
    nextDirection = { x: 1, y: 0 };
});

/* Mobile button controls */
document.getElementById("up").onclick = () => {
  if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
};
document.getElementById("down").onclick = () => {
  if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
};
document.getElementById("left").onclick = () => {
  if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
};
document.getElementById("right").onclick = () => {
  if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
};

resetGame();
setInterval(gameLoop, 100);
</script>

</body>
</html>

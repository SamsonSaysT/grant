<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Snake</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #000;
  height: 100%;
  width: 100%;
}

canvas {
  position: fixed;
  inset: 0;
  display: block;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const cellSize = 20;
let cols, rows;

function updateGrid() {
  cols = Math.floor(canvas.width / cellSize);
  rows = Math.floor(canvas.height / cellSize);
}
updateGrid();

window.addEventListener("resize", updateGrid);

let snake, direction, nextDirection, food, score;

function resetGame() {
  snake = [{ x: Math.floor(cols/2), y: Math.floor(rows/2) }];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  placeFood();
  score = 0;
}

function placeFood() {
  food = {
    x: Math.floor(Math.random() * cols),
    y: Math.floor(Math.random() * rows)
  };
}

function gameLoop() {
  direction = nextDirection;

  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y
  };

  // Wall collision
  if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    resetGame();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Snake
  ctx.fillStyle = "#fff";
  snake.forEach(part => {
    ctx.fillRect(part.x * cellSize, part.y * cellSize, cellSize-1, cellSize-1);
  });

  // Food
  ctx.fillStyle = "#0f0";
  ctx.fillRect(food.x * cellSize, food.y * cellSize, cellSize-1, cellSize-1);
}

// Desktop controls
window.addEventListener("keydown", e => {
  if (e.key === "ArrowUp" && direction.y !== 1)
    nextDirection = { x: 0, y: -1 };
  if (e.key === "ArrowDown" && direction.y !== -1)
    nextDirection = { x: 0, y: 1 };
  if (e.key === "ArrowLeft" && direction.x !== 1)
    nextDirection = { x: -1, y: 0 };
  if (e.key === "ArrowRight" && direction.x !== -1)
    nextDirection = { x: 1, y: 0 };
});

// Mobile tap controls (tap screen halves)
canvas.addEventListener("click", e => {
  const x = e.clientX;
  const y = e.clientY;

  const horizontal = x < canvas.width / 2 ? "left" : "right";
  const vertical = y < canvas.height / 2 ? "up" : "down";

  // Determine dominant direction based on distance from center
  const dx = x - canvas.width/2;
  const dy = y - canvas.height/2;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (horizontal === "left" && direction.x !== 1)
      nextDirection = { x: -1, y: 0 };
    if (horizontal === "right" && direction.x !== -1)
      nextDirection = { x: 1, y: 0 };
  } else {
    if (vertical === "up" && direction.y !== 1)
      nextDirection = { x: 0, y: -1 };
    if (vertical === "down" && direction.y !== -1)
      nextDirection = { x: 0, y: 1 };
  }
});

resetGame();
setInterval(gameLoop, 100);
</script>

</body>
</html>

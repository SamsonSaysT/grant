<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1" />
  <title>Grant</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
    }
    a {
      display: block;
      height: 100%;
      width: 100%;
    }
    img {
      position: fixed;
      top: 50%;
      left: 50%;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: contain;
      display: block;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <a href="https://www.instagram.com/meekergrant/" target="_blank">
    <img src="image.jpg" alt="Grant">
  </a>
</body>
</html>
